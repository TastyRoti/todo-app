name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start backend server
        working-directory: backend
        run: nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
        run: npm run build

      - name: Start frontend server
        working-directory: frontend
        run: nohup npm run start > frontend.log 2>&1 &

      - name: Wait for servers to be ready
        run: npx wait-on http://127.0.0.1:8000 http://localhost:3000 --timeout 60000

      - name: Show server logs if failed
        if: failure()
        run: |
          echo "=== Backend log ==="
          cat backend/backend.log || true
          echo "=== Frontend log ==="
          cat frontend/frontend.log || true

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test